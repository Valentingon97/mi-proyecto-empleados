{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-xl p-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Registrar Nuevo Empleado</h1>
    
    <!-- He corregido el action para que use 'crear' en lugar de '/store' -->
    <form method="POST" action="{{ url_for('crear') }}" class="space-y-6" enctype="multipart/form-data">

        <div>
            <label for="nombre" class="block text-sm font-semibold text-gray-700 mb-2">
                Nombre *
            </label>
            <input type="text" id="nombre" name="nombre" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg 
                          focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                   placeholder="Ingrese el nombre">
        </div>
        
        <div>
            <label for="apellido" class="block text-sm font-semibold text-gray-700 mb-2">
                Apellido *
            </label>
            <input type="text" id="apellido" name="apellido" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg 
                          focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                   placeholder="Ingrese el apellido">
        </div>
        
        <div>
            <label for="cedula" class="block text-sm font-semibold text-gray-700 mb-2">
                Cédula *
            </label>
            <input type="text" id="cedula" name="cedula" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg 
                          focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                   placeholder="Ingrese la cédula">
        </div>
        
        <div>
            <label for="telefono" class="block text-sm font-semibold text-gray-700 mb-2">
                Teléfono *
            </label>
            <input type="tel" id="telefono" name="telefono" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg 
                          focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                   placeholder="Ingrese el teléfono">
        </div>
        
        <div>
            <label for="direccion" class="block text-sm font-semibold text-gray-700 mb-2">
                Dirección *
            </label>
            <textarea id="direccion" name="direccion" required rows="3"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg 
                             focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                      placeholder="Ingrese la dirección completa"></textarea>
        </div>

        <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email *</label>
            <input type="email" id="email" name="email" required 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" 
                   placeholder="ejemplo@correo.com">
        </div>

        <div>
            <label for="tipo_contrato" class="block text-sm font-semibold text-gray-700 mb-2">Tipo de funcionario *</label>
            <select id="tipo_contrato" name="tipo_contrato" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                <option value="Jornalero">Jornalero</option>
                <option value="Asalariado">Asalariado</option>
            </select>
        </div>

        <div>
            <label for="foto" class="block text-sm font-semibold text-gray-700 mb-2">Imagen *</label>
            <input type="file" id="foto" name="foto" required accept="image/*"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>
        
        <div class="flex gap-4 pt-4">
            <button type="submit" 
                    class="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-lg 
                           hover:bg-indigo-700 transition font-semibold">
                Guardar Empleado
            </button>
            <a href="{{ url_for('index') }}" 
               class="flex-1 text-center bg-gray-500 text-white px-6 py-3 rounded-lg 
                      hover:bg-gray-600 transition font-semibold">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
